cpp(
    libraries( 
        [ all: -L ../$(CXXOBJDIR)
               -L ../../../core/$(CXXOBJDIR)
               -L ../../../event/$(CXXOBJDIR)
               -L ../../../io/$(CXXOBJDIR)
               -L ../../../test/$(CXXOBJDIR) ]
    )
    sources(
        [ all: -std=c++17 ]
    )
    run(
        "DYLD_LIBRARY_PATH=../$(CXXOBJDIR):../../../core/$(CXXOBJDIR):../../../event/$(CXXOBJDIR):../../../io/$(CXXOBJDIR):../../../test/$(CXXOBJDIR)"
    )
)
