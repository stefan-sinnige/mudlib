version(1.0.0)
project(mudio)
order(mudio test)
cpp(
    target(shared-library)
    libraries(
        mudcore
        mudevent)
    headers(
        include/mud/io.h
        include/mud/io/exception.h
        include/mud/io/ip.h
        include/mud/io/ns.h
        include/mud/io/pipe.h
        include/mud/io/streambuf.h
